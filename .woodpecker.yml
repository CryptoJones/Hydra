# Woodpecker CI pipeline for Codeberg.
#
# To enable: visit https://ci.codeberg.org/ , sign in with your Codeberg
# account, and toggle CI on for this repository. The first push after that
# triggers a build.

when:
  - event: push
  - event: pull_request

steps:
  - name: bats
    image: ubuntu:24.04
    commands:
      - apt-get update -qq
      # See .github/workflows/test.yml for why we install the extra USB/QEMU
      # tools — bats tests invoke cmd_usb which runs preflight_tools before
      # the arg-validation the tests assert on.
      - apt-get install -y --no-install-recommends
          bats shellcheck
          parted gdisk exfatprogs
          qemu-system-x86 qemu-utils
          jq numfmt
      - shellcheck --severity=warning -e SC1091,SC2155 hydra.sh
      - bats tests/
